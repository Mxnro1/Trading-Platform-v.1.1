name: Update Macro Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: '15 */6 * * *'

permissions:
  contents: write

jobs:
  update-macro-snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build fresh snapshot
        run: node tools/update-macro-snapshot.mjs

      - name: Commit and push snapshot
        run: |
          if git diff --quiet -- macro-snapshot.json; then
            echo "No snapshot changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add macro-snapshot.json
          git commit -m "chore: update macro snapshot"
          git push
